# project.yml — XcodeGen spec for the Canopy iOS host (Author A, SHARED CONTRACT §2).
#
# This is the *source of truth* for the Xcode project. The `.xcodeproj` is GENERATED on a
# Mac with `xcodegen generate` (never hand-edited, never checked in as the truth) so the
# project is text-diffable, regenerable, and authorable without a Mac. See README-ios.md.
#
# Two targets:
#   • CanopyHostCore  — static library: the host engine (.mm/.swift) + the PORTABLE shared
#                       C++ (../shared/cpp/*.cpp) added by reference. This is the half that
#                       reuses the verbatim portable seam (CanopyFabric/CanopyModules/
#                       CanopyBlobs/EchoModule/CanopyImage/BillingModule). NEVER compiles the
#                       JNI half (CanopyJni.cpp, CanopyHostJni.cpp, StreamingJniModule.cpp,
#                       RestoreEngineModule.cpp) — §0.5.
#   • CanopyHostApp   — the UIApplication shell: AppDelegate/SceneDelegate set a
#                       CanopyHostViewController as the window root, and a build phase copies
#                       the compiled bundle + the Core ML model into the app bundle.
#
# Dependencies (Hermes + JSI + Yoga) come from CocoaPods, pinned to the ONE React Native
# release whose Hermes matches Android's 0.76.9 (Risk #1). See Podfile. `pod install` writes
# `CanopyHost.xcworkspace`; open THAT, not the `.xcodeproj`.

name: CanopyHost

options:
  bundleIdPrefix: com.canopyhost
  deploymentTarget:
    iOS: "15.1"               # RN 0.76.9 min_ios_version_supported; PHPicker, StoreKit 2, async/await, UIGraphicsImageRenderer (§2.2)
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  defaultConfig: Debug

# --------------------------------------------------------------------------------------------
# Build settings applied to EVERY target (then specialized per target below).
# --------------------------------------------------------------------------------------------
settings:
  base:
    # --- C++ / ObjC++ toolchain (§2.2) ---
    CLANG_CXX_LANGUAGE_STANDARD: "c++17"
    CLANG_CXX_LIBRARY: "libc++"
    GCC_C_LANGUAGE_STANDARD: gnu11
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_MODULES: YES

    # --- Swift <-> ObjC++ interop (§2.2 / §2.4) ---
    SWIFT_VERSION: "5.0"
    DEFINES_MODULE: YES

    # --- Header search: the portable shared C++ + the vendored JSI headers (§2.2) ---
    # $(SRCROOT) is host/ios. The shared C++ lives one level up under host/shared.
    # NOTE: the Hermes + Yoga header search paths are injected by CocoaPods (the pods'
    # generated xcconfig); we add only the Canopy-owned paths here so the build works
    # whether JSI comes from the vendored third_party set or the Hermes pod's own headers
    # (they must be the SAME version — Risk #1).
    HEADER_SEARCH_PATHS:
      - "$(inherited)"
      - "$(SRCROOT)/../shared/cpp"
      - "$(SRCROOT)/../shared/third_party/jsi"
      # The C1 ObjC bridge headers (CanopyModule.h / CanopyNativeModule.h /
      # CanopyStreamingModuleBase.h) are imported FLAT by every capability module
      # (e.g. CanopyImageModule.mm: #import "CanopyModule.h"). Put the Bridge dir on the
      # search path so those flat includes resolve without per-file relative paths.
      - "$(SRCROOT)/CanopyHostCore/Bridge"
      # Yoga's public C API header (<yoga/Yoga.h>). The Yoga pod's podspec lives at
      # node_modules/react-native/ReactCommon/yoga, so CocoaPods references its headers THERE (they
      # are NOT copied under Pods/). Point at that dir explicitly (xcconfig-independent) — it contains
      # yoga/Yoga.h, so <yoga/Yoga.h> resolves regardless of pod base-config layering. The Pods path
      # is a harmless fallback for layouts that do stage public headers under Pods/.
      - "$(SRCROOT)/node_modules/react-native/ReactCommon/yoga"
      - "$(SRCROOT)/Pods/Headers/Public/Yoga"

    # --- Diagnostics ---
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: NO

  configs:
    Debug:
      GCC_OPTIMIZATION_LEVEL: "0"
      GCC_PREPROCESSOR_DEFINITIONS:
        - "$(inherited)"
        - "DEBUG=1"
      SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      ONLY_ACTIVE_ARCH: YES
    Release:
      GCC_OPTIMIZATION_LEVEL: "s"
      SWIFT_OPTIMIZATION_LEVEL: "-O"
      VALIDATE_PRODUCT: YES

# --------------------------------------------------------------------------------------------
# TARGETS
# --------------------------------------------------------------------------------------------
targets:

  # ------------------------------------------------------------------------------------------
  # CanopyHostCore — the host engine static library.
  #
  # Sources = everything under CanopyHostCore/ (the .mm/.swift the per-area authors B–F own)
  #         + the PORTABLE shared C++ added by *explicit file reference* (NOT a glob of
  #           ../shared/cpp — we must EXCLUDE the JNI half). Listing each file keeps the
  #           never-compile set (§0.5) impossible to add by accident.
  # ------------------------------------------------------------------------------------------
  CanopyHostCore:
    type: library.static
    platform: iOS
    sources:
      # --- host engine, ObjC++ / Swift (owned by authors B–F) ---
      - path: CanopyHostCore
        excludes:
          - "**/.DS_Store"
          - "**/tools/**"                   # ML/tools/convert_restore.py is a build-time script
                                            # (the ESPCN->Core ML converter), not a compiled source
                                            # (§F). **/ so the NESTED ML/tools/ path is matched, not
                                            # just a top-level tools/ dir.

      # --- PORTABLE shared C++ added BY REFERENCE (§2 "Shared C++ added ... by reference") ---
      # These compile on iOS unchanged (CanopyFabric/Modules/Blobs/Echo/Image are pure JSI+STL;
      # BillingModule is portable AFTER Author E's §0.4 `#if defined(__ANDROID__)` JNI guard).
      - path: ../shared/cpp/CanopyFabric.cpp
        group: SharedCpp
      - path: ../shared/cpp/CanopyModules.cpp
        group: SharedCpp
      - path: ../shared/cpp/CanopyBlobs.cpp
        group: SharedCpp
      - path: ../shared/cpp/EchoModule.cpp
        group: SharedCpp
      - path: ../shared/cpp/CanopyImage.cpp
        group: SharedCpp
      - path: ../shared/cpp/BillingModule.cpp     # JNI bits §0.4-guarded; stream half is portable
        group: SharedCpp
      # NB: RestoreColorOps.{h,cpp} is added here too IF Author F extracts the YCbCr/resize/blend
      # pipeline into a portable TU (06-ios-bringup §6 "Reuse opportunity"). Uncomment when it lands:
      # - path: ../shared/cpp/RestoreColorOps.cpp
      #   group: SharedCpp
      #
      # NEVER added (§0.5 — Android-only, JNI/ORT): CanopyJni.cpp, CanopyHostJni.cpp,
      # StreamingJniModule.cpp, RestoreEngineModule.cpp (replaced by Core ML, §6).

    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: "CanopyHostCore/CanopyHostCore-Bridging-Header.h"
        # A static lib that vends a Swift module + ObjC++ to the app target.
        OTHER_CPLUSPLUSFLAGS:
          - "$(inherited)"
          - "-fcxx-exceptions"
          - "-fexceptions"          # JSI throws jsi::JSError; boot guards catch it (§3.2 step 7-9)
        # Treat .mm as ObjC++; .cpp as C++ (the portable shared seam) — Xcode infers from
        # extension, no override needed.
    # Pods (Hermes/JSI/Yoga) are attached by CocoaPods at the workspace level (see Podfile);
    # there are no explicit XcodeGen dependency entries, so the `dependencies:` key is omitted
    # entirely. A bare `dependencies:` with no list items decodes to null and makes `xcodegen
    # generate` fail (the project never generates) — so it must be absent, not empty.
    dependencies: []

  # ------------------------------------------------------------------------------------------
  # CanopyHostApp — the UIApplication shell.
  # ------------------------------------------------------------------------------------------
  CanopyHostApp:
    type: application
    platform: iOS
    sources:
      - path: CanopyHostApp
        excludes:
          - "**/.DS_Store"
          - "Resources/canopy.bundle.js"        # copied by the build phase below, not compiled
          - "Resources/canopy.bundle.hbc"       # RNV-7 bytecode bundle — copied below, not compiled
          - "Resources/models/**"               # the Core ML model is a resource, copied below
          - "Products.storekit"                 # L-I5 StoreKit 2 Simulator config — referenced by the
                                                # scheme (run.storeKitConfiguration), NOT bundled/compiled
                                                # into the shipped .app (it is a DEV/Simulator-only local
                                                # store; production uses the real App Store Connect product)
    settings:
      base:
        INFOPLIST_FILE: "CanopyHostApp/Info.plist"
        # Debug/dev entitlements (aps-environment=development). The Release config below overrides
        # this to the production entitlements (aps-environment=production) — IOS-10.
        CODE_SIGN_ENTITLEMENTS: "CanopyHostApp/CanopyHost.entitlements"
        PRODUCT_BUNDLE_IDENTIFIER: com.canopyhost.app
        PRODUCT_NAME: CanopyHost
        CURRENT_PROJECT_VERSION: "1"
        MARKETING_VERSION: "1.0"
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1,2"            # iPhone + iPad (Share/PHPicker iPad popover §5.3)
        # The app links the Core static lib; Swift in the app sees the core's module + bridging.
        SWIFT_OBJC_BRIDGING_HEADER: "CanopyHostCore/CanopyHostCore-Bridging-Header.h"
        # --- Code signing (IOS-10 — iOS analog of AND-2's signingConfigs.release) ---
        # Automatic (Xcode-managed) signing: the archive step runs with -allowProvisioningUpdates so
        # Xcode resolves the distribution cert + provisioning profile for $DEVELOPMENT_TEAM. No real
        # 10-char Team ID is committed — it is injected at archive time via $APPLE_TEAM_ID
        # (remote-build.sh archive / the CI job), exactly as AND-2 injects CANOPY_STORE_* gradle props.
        # The token "" leaves DEVELOPMENT_TEAM unset in the checked-in project so a Mac build that
        # does NOT pass APPLE_TEAM_ID fails LOUD ("Signing requires a development team") rather than
        # silently mis-signing — the deliberate fail-closed posture.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "Apple Development"
        # Bitcode is deprecated/removed from the App Store toolchain (Xcode 14+); ship the arm64
        # slice directly. Matches ExportOptions.plist compileBitcode=false.
        ENABLE_BITCODE: NO
        # Force the ObjC/ObjC++ categories & C++ symbols in the static lib to load (the host
        # factory, the module registrations, the blob registry definition are referenced
        # indirectly via the registry; -ObjC ensures none are dead-stripped). This is the
        # load-bearing flag the IOS-10 plan calls out: under a CONFIG=Release device archive
        # (-Os, DEAD_CODE_STRIPPING=YES) the linker would otherwise drop the +load-time module
        # registrations (CanopyModuleHost) and the weak Core ML restore factory, which are reached
        # only by NAME through the registry — never by a direct call the linker can see. -ObjC
        # (force-load every ObjC class/category) + -all_load keep them in the archived binary.
        OTHER_LDFLAGS:
          - "$(inherited)"
          - "-ObjC"
          - "-all_load"
          - "-lc++"
          - "-framework"                          # Yoga pod's static framework — CocoaPods links
          - "Yoga"                                #   hermes but NOT Yoga under use_frameworks!:static
                                                  #   + abstract_target, so link it explicitly.
        # Find Yoga.framework where CocoaPods builds it. $(PODS_CONFIGURATION_BUILD_DIR) is defined by
        # the applied pod xcconfig (it also resolves hermes); $(inherited) keeps the hermes paths.
        FRAMEWORK_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PODS_CONFIGURATION_BUILD_DIR)/Yoga"
      # --- Per-config specialization (IOS-10) ------------------------------------------------
      configs:
        Debug:
          # Simulator/dev signing is automatic-or-none; the dev entitlements (development APNs)
          # already apply via the base CODE_SIGN_ENTITLEMENTS above.
          ONLY_ACTIVE_ARCH: YES
        Release:
          # The shipped (archive) entitlements: aps-environment=production (CanopyHostRelease.
          # entitlements). This is the ONLY archive-time difference from the dev set — wired here so
          # it is impossible to forget to flip at archive time. The CI/device path uses CONFIG=Release.
          CODE_SIGN_ENTITLEMENTS: "CanopyHostApp/CanopyHostRelease.entitlements"
          # Dead-strip discipline for the -Os device archive. DEAD_CODE_STRIPPING removes unreachable
          # C/C++/Swift; the registry-reached registrations are kept by -ObjC/-all_load (base
          # OTHER_LDFLAGS) so this strips only genuinely-dead code. LINK_WITH_STANDARD_LIBRARIES stays
          # on so libc++ resolves. VALIDATE_PRODUCT (inherited from the top-level Release config) runs
          # the store-submission validation as part of the archive.
          DEAD_CODE_STRIPPING: YES
          STRIP_INSTALLED_PRODUCT: YES
          STRIP_STYLE: "non-global"        # keep global (exported) symbols; strip local/debug only
          DEPLOYMENT_POSTPROCESSING: YES
          # dSYM for native crash symbolication (uploaded by ExportOptions uploadSymbols=true — the
          # iOS twin of AND-10 archiving R8 mapping.txt).
          DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    dependencies:
      - target: CanopyHostCore
        embed: false                            # static lib — linked, not embedded
      # System frameworks referenced by capability modules in libCanopyHostCore.a that clang module
      # autolinking did NOT pull into the app link. A static lib links no frameworks itself, so the
      # app must link them: CoreML (RestoreEngine), Photos + PhotosUI (Album/Photos), CoreHaptics +
      # AudioToolbox (Vibration). (UIKit/Foundation/StoreKit/etc. already autolink.)
      - sdk: AudioToolbox.framework
      - sdk: CoreHaptics.framework
      - sdk: CoreML.framework
      - sdk: Photos.framework
      - sdk: PhotosUI.framework
    preBuildScripts: []
    postCompileScripts: []
    buildPhases: []
    # --- Copy the compiled Canopy bundle + the Core ML model into the .app (§2.1) ---
    postBuildScripts:
      - name: "Copy Canopy Bundle"
        # canopy.bundle.js is produced by `canopy-native build` and dropped in
        # CanopyHostApp/Resources/ (the app's view controller loads it from the main bundle,
        # CanopyHostViewController §3.2 step 7). restore.mlpackage is converted offline by
        # Author F's tools/convert_restore.py and dropped in Resources/models/. Xcode compiles
        # the .mlpackage → .mlmodelc automatically when it is a target resource; we instead
        # copy explicitly so a placeholder bundle/model never blocks the build.
        basedOnDependencyAnalysis: false
        outputFiles:
          - "$(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/canopy.bundle.js"
          - "$(BUILT_PRODUCTS_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/canopy.bundle.hbc"
        script: |
          set -e
          DEST="${BUILT_PRODUCTS_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          SRC="${SRCROOT}/CanopyHostApp/Resources"
          if [ -f "${SRC}/canopy.bundle.js" ]; then
            cp -f "${SRC}/canopy.bundle.js" "${DEST}/canopy.bundle.js"
          else
            echo "warning: canopy.bundle.js missing — writing an empty placeholder. Run 'canopy-native build'." >&2
            : > "${DEST}/canopy.bundle.js"
          fi
          # RNV-7: copy the real Hermes .hbc bytecode bundle when present (the VC prefers it over
          # the JS bundle). Optional — a JS-only build (no hermesc at build time) just lacks it.
          if [ -f "${SRC}/canopy.bundle.hbc" ]; then
            cp -f "${SRC}/canopy.bundle.hbc" "${DEST}/canopy.bundle.hbc"
          else
            rm -f "${DEST}/canopy.bundle.hbc" || true
          fi
          if [ -d "${SRC}/models/restore.mlpackage" ]; then
            mkdir -p "${DEST}/models"
            cp -Rf "${SRC}/models/restore.mlpackage" "${DEST}/models/"
          else
            echo "warning: restore.mlpackage missing — RestoreEngine will be unavailable. Run convert_restore.py (§F)." >&2
          fi

  # ------------------------------------------------------------------------------------------
  # Tests — ObjC++ XCTest (renderer + bridge) and the XCUITest E2E harness (§7, §1 Tests/).
  # ------------------------------------------------------------------------------------------
  CanopyHostCoreTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - "CanopyHostUITests/**"              # the UI test target owns those
          - "**/.DS_Store"
      # IOS-9: the SHARED cross-platform test-vector corpus, bundled as a resource of this test
      # target so CanopyLayoutVectorTests.mm reads the SAME single source of truth the Android
      # instrumentation runner reads (host/android/.../androidTest/assets/layout-vectors.json is the
      # synced copy of this same file; scripts/check-cross-platform-vectors.sh asserts they are
      # byte-identical so the two hosts can never run divergent corpora).
      - path: ../shared/test-vectors/layout-vectors.json
        buildPhase: resources
      # L-I4: the SHARED before/after wipe-compositor corpus, bundled the same way so
      # CanopyBeforeAfterVectorTests.mm reads the SAME single source of truth the Android JVM runner
      # (CanopyBeforeAfterMathTest) reads. scripts/check-beforeafter-parity.sh asserts the wiring.
      - path: ../shared/test-vectors/beforeafter-vectors.json
        buildPhase: resources
    settings:
      base:
        SWIFT_OBJC_BRIDGING_HEADER: "CanopyHostCore/CanopyHostCore-Bridging-Header.h"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CanopyHostCore

  CanopyHostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/CanopyHostUITests
        excludes:
          - "**/.DS_Store"
          # L-I6: the lumen-restore fixture is seeded into the Simulator/device photo library via
          # `xcrun simctl addmedia` (the iOS twin of the Android gallery seed) — NOT bundled into the
          # UI-test target, so it never bloats the test bundle. It is the byte-identical copy of the
          # Android canonical fixture (host/android/app/src/main/assets/lumen-test.jpg); the
          # cross-platform parity gate scripts/check-ios-lumen-e2e.sh asserts they stay identical.
          - "Fixtures/**"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: CanopyHostApp

# --------------------------------------------------------------------------------------------
# SCHEMES — one runnable app scheme that also runs both test bundles.
# --------------------------------------------------------------------------------------------
schemes:
  CanopyHost:
    build:
      targets:
        CanopyHostApp: all
        CanopyHostCore: all
    run:
      config: Debug
      # L-I5: the StoreKit 2 Simulator config. Attaching it to the run action makes a debug Simulator
      # run resolve the local `lifetime_unlock` product through Product.products(for:) / purchase()
      # WITHOUT a paid Apple Developer account or a sandbox sign-in — so the StoreKit 2 paywall is
      # exercisable end-to-end on the Simulator. Path is relative to $SRCROOT (host/ios). A device /
      # TestFlight / App Store build ignores this and uses the real App Store Connect product.
      storeKitConfiguration: CanopyHostApp/Products.storekit
    test:
      config: Debug
      # Same StoreKit config for the test action so a Billing XCTest/XCUITest drives the local store.
      storeKitConfiguration: CanopyHostApp/Products.storekit
      targets:
        - CanopyHostCoreTests
        - CanopyHostUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

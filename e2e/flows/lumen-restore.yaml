# Maestro flow — the LUMEN restore path against the REAL Lumen app (apps/lumen/app/src/Main.can).
# Selects on the SAME testID contract as the Appium spec (testID -> Android content-description /
# iOS accessibilityIdentifier) and asserts the deterministic screen copy the Elm `update` renders.
#
# This is the Appium lumen-restore.mjs spine in Maestro form: pick → restore → compare → save,
# plus the share sheet. The Appium spec (node lumen-restore.mjs) is the source of truth — it also
# seeds a small, draw-safe gallery fixture and captures screenshots; run that for the full gate.
#
# Run:    maestro test flows/lumen-restore.yaml
# Install: curl -Ls "https://get.maestro.mobile.dev" | bash
#
# PRECONDITION: the host APK (org.canopy.echo) is installed and booting the Lumen bundle (the
# dev-override push: `scripts/dev.sh apps/lumen/app`, or run-matrix.sh which does it), and the
# device gallery has at least one SMALL (≤512px) photo as the most-recent image so the ESPCN
# restore output stays under Android's ~100MB Canvas draw limit.
appId: org.canopy.echo
---
# clean launch → the Pick screen, fresh TEA state
- launchApp:
    clearState: true
    permissions:
      POST_NOTIFICATIONS: allow

# 0. PICK
- assertVisible: "Lumen"
- assertVisible: "Bring old photos back to life."
- tapOn:
    id: "choose"          # testID -> accessibility id

# 1. the OS photo picker opens; pick the most-recent (seeded small) photo
- assertVisible:
    text: "Photo taken on.*"
    timeout: 15000
- tapOn:
    text: "Photo taken on.*"
    index: 0

# 2. DETECTED -> the one-tap "Just fix it"
- assertVisible:
    text: "Ready to restore"
    timeout: 15000
- tapOn:
    id: "justfix"

# 3. COMPARE -> the real ESPCN restore finished; the before/after wipe + the "Enhanced to N×N"
#    inference proof + the free-tier export gate are shown.
- assertVisible:
    text: "Before / After"
    timeout: 90000
- assertVisible:
    text: "Enhanced to .*"
- assertVisible: "✦ Lumen"

# 4. SHARE -> the system share sheet opens; dismiss it and confirm we land back on Compare
- tapOn:
    id: "share"
- back
- assertVisible:
    text: "Before / After"
    timeout: 20000

# 5. SAVE -> Album.save (MediaStore) -> the Done screen
- tapOn:
    id: "save"
- assertVisible:
    text: "Saved to your Lumen album."
    timeout: 25000
- assertVisible:
    id: "another"

# 6. RESTORE ANOTHER -> the loop closes back to a fresh Pick
- tapOn:
    id: "another"
- assertVisible:
    text: "Pick a photo to restore"
    timeout: 10000
